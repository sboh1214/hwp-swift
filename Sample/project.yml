name: HwpSwiftSample
options:
  bundleIdPrefix: dev.sboh
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  hwp-swift:
    path: ..

targets:
  HwpSwiftSample:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: HwpSwiftSample
    dependencies:
      - package: hwp-swift
        product: HwpKit
      - package: hwp-swift
        product: HwpKitCore
    entitlements:
      path: HwpSwiftSample/HwpSwiftSample.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.sboh.HwpSwiftSample
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: HwpSwiftSample
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
