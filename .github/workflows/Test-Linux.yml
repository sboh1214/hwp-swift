name: Test Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Swift@${{ matrix.swift }} on Linux

    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}-jammy
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.9", "6.0"]

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: |
        swift --version
        swift test -v --enable-test-discovery
