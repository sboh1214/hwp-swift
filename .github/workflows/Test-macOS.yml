name: Test macOS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Swift@${{ matrix.swift }} on macOS

    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        swift: ["5.9", "6.0"]

    steps:
    - uses: actions/checkout@v4
    - uses: swift-actions/setup-swift@v2
      with:
        swift-version: ${{ matrix.swift }}
    - name: Run tests
      run: |
        swift --version
        swift test -v --enable-test-discovery
